<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Catálogo de Juegos</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; }
        h1 { text-align: center; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #334155; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .cover-img { width: 100%; height: 250px; object-fit: cover; background: #000; display: block; }
        .info { padding: 12px; font-size: 13px; border-top: 1px solid #334155; }
        .title { font-weight: bold; display: block; height: 35px; overflow: hidden; margin-bottom: 5px; color: #f1f5f9; }
        .size { color: var(--accent); font-weight: bold; font-family: monospace; }
        .loading { text-align: center; font-size: 1.2em; margin-top: 50px; }
    </style>
</head>
<body>

    <h1>🎮 Mi Colección de Juegos</h1>
    <div id="status" class="loading">Cargando colección...</div>
    <div class="grid" id="gallery"></div>

    <script>
        // Esta función se ejecuta sola al abrir la página
        window.onload = function() {
            fetch('lista.csv') // Busca el archivo en la misma carpeta
                .then(response => {
                    if (!response.ok) throw new Error('No se encontró el archivo lista.csv');
                    return response.text();
                })
                .then(data => {
                    document.getElementById('status').style.display = 'none';
                    procesarCSV(data);
                })
                .catch(error => {
                    document.getElementById('status').innerText = 'Error: Asegúrate de que "lista.csv" esté en la misma carpeta.';
                    console.error(error);
                });
        };

        function procesarCSV(csvText) {
            const lines = csvText.split(/\r?\n/).slice(1);
            const gallery = document.getElementById('gallery');

            lines.forEach(line => {
                const columns = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (columns.length < 2) return;
                
                const titulo = columns[0].replace(/"/g, '').trim();
                const peso = columns[1].replace(/"/g, '').trim();
                const query = encodeURIComponent(titulo + " switch cover art");
                
                // Usamos un motor de imágenes que permite carga directa
                const imageUrl = `https://tse1.mm.bing.net/th?q=${query}&w=250&h=350&c=7&rs=1&p=0&dpr=1&pid=Api`;

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img class="cover-img" src="${imageUrl}" alt="${titulo}" loading="lazy">
                    <div class="info">
                        <span class="title">${titulo}</span>
                        <span class="size">💾 ${peso} GB</span>
                    </div>
                `;
                gallery.appendChild(card);
            });
        }
    </script>
</body>
</html>
